<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5 - Lista de Tarefas</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: #0f0f1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 48px 16px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            color: #e0d7ff;
            font-size: 2rem;
            margin-bottom: 32px;
            letter-spacing: 1px;
            border-left: 4px solid #7c3aed;
            padding-left: 14px;
        }

        /* Área de cadastro: campo de texto + botão na mesma linha */
        .cadastro {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .cadastro input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #3b2f6e;
            background: #1a1a2e;
            color: #e0d7ff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .cadastro input[type="text"]:focus {
            border-color: #7c3aed;
        }

        .cadastro input[type="text"]::placeholder {
            color: #5a5480;
        }

        .cadastro button {
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            background: #7c3aed;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .cadastro button:hover {
            background: #6d28d9;
        }

        .cadastro button:active {
            transform: scale(0.97);
        }

        /* Lista — sem marcadores padrão do <ul> */
        #lista-tarefas {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Estilo base de cada item da lista */
        #lista-tarefas li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            transition: opacity 0.3s, background 0.3s;
        }

        /* Tarefa NÃO CONCLUÍDA — destaque com borda roxa e fundo levemente iluminado */
        #lista-tarefas li.pendente {
            background: #1e1b38;
            border: 1.5px solid #4c3599;
        }

        /* Tarefa CONCLUÍDA — visual apagado com tachado na descrição */
        #lista-tarefas li.concluida {
            background: #111120;
            border: 1.5px solid #2a2a3a;
            opacity: 0.65;
        }

        /* Checkbox estilizado */
        #lista-tarefas input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #7c3aed;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Descrição da tarefa */
        .descricao {
            flex: 1;
            font-size: 1rem;
            color: #cfc8f5;
            transition: color 0.3s, text-decoration 0.3s;
        }

        /* Tachado na descrição quando a tarefa está concluída */
        .concluida .descricao {
            text-decoration: line-through;
            color: #5a5480;
        }

        /* Badge de status */
        .badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Badge da tarefa pendente — roxo vibrante */
        .pendente .badge {
            background: #3b1f6e;
            color: #c4a9ff;
        }

        /* Badge da tarefa concluída — tom neutro */
        .concluida .badge {
            background: #1e1e2e;
            color: #4a4468;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Lista de Tarefas</h1>

        <!-- Campo de texto para a descrição e botão de adição -->
        <div class="cadastro">
            <input type="text" id="input-descricao" placeholder="Descrição da nova tarefa..." />
            <button id="btn-adicionar">Adicionar</button>
        </div>

        <!-- Lista vazia ao carregar — preenchida via JavaScript com renderizarTarefas() -->
        <ul id="lista-tarefas"></ul>
    </div>

    <script src="exercicio5.js"></script>
</body>

</html>
