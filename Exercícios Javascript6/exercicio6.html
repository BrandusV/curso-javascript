<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6 - Botão Curtir</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: #0f0f1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 48px 16px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            color: #e0d7ff;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            border-left: 4px solid #7c3aed;
            padding-left: 14px;
        }

        .subtitulo {
            color: #5a5480;
            font-size: 0.85rem;
            margin-bottom: 36px;
            padding-left: 18px;
        }

        /* Linha com campo de texto + botão Curtir */
        .curtir-form {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }

        .curtir-form input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #3b2f6e;
            background: #1a1a2e;
            color: #e0d7ff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .curtir-form input[type="text"]:focus {
            border-color: #7c3aed;
        }

        .curtir-form input[type="text"]::placeholder {
            color: #5a5480;
        }

        /* Botão Curtir com ícone de coração */
        .curtir-form button {
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            background: #7c3aed;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .curtir-form button:hover {
            background: #6d28d9;
        }

        .curtir-form button:active {
            transform: scale(0.97);
        }

        /* Mensagem de erro quando o campo está vazio ou nome duplicado */
        #msg-erro {
            font-size: 0.85rem;
            color: #f87171;
            min-height: 20px;
            margin-bottom: 20px;
            padding-left: 4px;
            transition: opacity 0.3s;
        }

        /* Card que exibe o resultado dos "curtidos" */
        .card-curtidas {
            background: #1e1b38;
            border: 1.5px solid #4c3599;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .card-curtidas .label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7c3aed;
            margin-bottom: 8px;
        }

        /* Parágrafo principal que muda conforme as regras do exercício */
        #paragrafo-curtidas {
            font-size: 1rem;
            color: #cfc8f5;
            line-height: 1.5;
        }

        /* Contador de curtidas abaixo do parágrafo */
        #contador {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #5a5480;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>&#10084; Curtir</h1>
        <p class="subtitulo">Digite seu nome e clique em curtir para aparecer na lista</p>

        <!-- Campo de texto para o nome e botão de curtir -->
        <div class="curtir-form">
            <input type="text" id="input-nome" placeholder="Seu nome..." maxlength="50" />
            <button id="btn-curtir">&#10084; Curtir</button>
        </div>

        <!-- Mensagem de erro (campo vazio ou nome duplicado) — ocultada por padrão -->
        <p id="msg-erro"></p>

        <!-- Card com o parágrafo atualizado pelo JavaScript -->
        <div class="card-curtidas">
            <p class="label">Curtidas</p>
            <!-- Parágrafo que segue as regras: vazio / 1 / 2 / 3+ pessoas -->
            <p id="paragrafo-curtidas">Ninguém curtiu</p>
            <p id="contador"></p>
        </div>
    </div>

    <script src="exercicio6.js"></script>
</body>

</html>
